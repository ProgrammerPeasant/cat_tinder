name: Flutter CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v3
        with:
          name: cat_tinder_release
          path: build/app/outputs/apk/release/
      
      - name: Analyze
        run: flutter analyze
      
      - name: Check formatting
        run: dart format --set-exit-if-changed lib test

  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Run tests
        run: flutter test --coverage
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: success()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Setup .env file
        run: |
          echo "CAT_API_KEY=${{ secrets.CAT_API_KEY }}" > .env
      
